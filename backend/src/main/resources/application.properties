spring.application.name=skincare-api

server.port=${PORT:8080}
server.forward-headers-strategy=framework

# Cloud SQL via Socket Factory (Cloud Run)
spring.datasource.url=jdbc:postgresql://google/${DB_NAME:glowlab_db}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=2

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# CORS — origenes permitidos (separados por coma)
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500