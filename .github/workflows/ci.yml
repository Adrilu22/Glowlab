name: CI — Build and Test

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  # ══════════════════════════════════════════
  # JOB 1: Compilar y verificar integridad
  # ══════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar Backend con Maven
        run: |
          if [ -d "backend" ] && [ -f "backend/mvnw" ]; then
            cd backend && ./mvnw clean compile -q
            echo "✅ Backend compilado correctamente"
          else
            echo "⚠️  Backend no encontrado — saltando paso"
          fi

      - name: Verificar que el frontend existe
        run: |
          test -f frontend/index.html && echo "✅ index.html" || (echo "❌ Falta index.html" && exit 1)

  # ══════════════════════════════════════════
  # JOB 2: Verificación E2E (solo main)
  # El deploy real lo hace Cloud Build en GCP
  # ══════════════════════════════════════════
  e2e-verify:
    name: E2E — Verificar Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Reemplaza esta URL con la URL real de glowlab-api después del primer deploy
    env:
      CLOUD_RUN_URL: https://glowlab-api-REEMPLAZAR.us-central1.run.app

    steps:
      - name: Verificar API de Cloud Run responde
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${CLOUD_RUN_URL}/api/productos")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Cloud Run responde correctamente"
          else
            echo "⚠️  Cloud Run no responde — status $STATUS (actualiza CLOUD_RUN_URL)"
          fi

      - name: Verificar que el frontend se sirve desde Cloud Run
        continue-on-error: true
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${CLOUD_RUN_URL}/")
          echo "Frontend HTTP status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Frontend accesible" || echo "⚠️  Frontend no responde"
