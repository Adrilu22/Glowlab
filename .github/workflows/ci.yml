name: CI — Build and Test

on:
  push:
    branches: [ main, production, development ]
  pull_request:
    branches: [ main, production, development ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java 21 (Backend)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar Backend con Maven (Si existe)
        run: |
          if [ -d "backend" ]; then
            cd backend
            if [ -f "mvnw" ]; then
              ./mvnw clean compile
            else
              echo "Carpeta backend encontrada, pero falta el wrapper de Maven. Saltando compilación."
            fi
          else
            echo "Carpeta backend no encontrada aún. Saltando este paso."
          fi

      - name: Verificar Integridad del Frontend (Si existe)
        run: |
          if [ -d "frontend" ]; then
            echo "Verificando archivos del frontend..."
            test -f frontend/index.html && echo "✅ index.html encontrado" || echo "Falta index.html"
          else
            echo "Carpeta frontend no encontrada aún. Saltando este paso."
          fi

      - name: Notificación de Éxito
        run: echo "✅ La revisión pasó con éxito en $(date)"