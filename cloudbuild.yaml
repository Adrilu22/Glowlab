steps:
  # ── 1. Compilar con Maven ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/mvn'
    args: ['clean', 'package', '-DskipTests']
    dir: 'backend'

  # ── 2. Construir imagen Docker ─────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'

  # ── 3. Subir imagen a Artifact Registry ───────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api']

  # ── 4. Desplegar en Cloud Run (contraseña desde Secret Manager) ─
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'glowlab-api'
      - '--image=us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--add-cloudsql-instances=api-de-skincare:us-central1:glowlab-db'
      - '--set-env-vars=DB_NAME=skincare,DB_USER=postgres,INSTANCE_CONNECTION_NAME=api-de-skincare:us-central1:glowlab-db'
      - '--set-secrets=DB_PASSWORD=db-password:latest'
      - '--timeout=600'
      - '--cpu=2'
      - '--memory=2Gi'
      - '--quiet'

  # ── 5. Desplegar frontend en Firebase Hosting ─────────────────
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools --quiet
        firebase deploy --only hosting \
          --project api-de-skincare-22722 \
          --token $$FIREBASE_TOKEN \
          --non-interactive
    dir: 'frontend'
    secretEnv: ['FIREBASE_TOKEN']

availableSecrets:
  secretManager:
    - versionName: projects/api-de-skincare/secrets/firebase-token/versions/latest
      env: 'FIREBASE_TOKEN'

images:
  - 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/api-de-skincare/cloud-run-source-deploy/skincare-api:latest'
